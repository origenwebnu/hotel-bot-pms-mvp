name: Deploy to DigitalOcean

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.repository == 'origenwebnu/hotel-bot-pms-mvp'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            export PUBLIC_IP="${{ secrets.DROPLET_IP }}"
            if [ -d /opt/hotel-bot/.git ]; then
              cd /opt/hotel-bot
              git fetch origin
              git checkout main
              git pull origin main
              bash infra/digitalocean/remote-install.sh
            else
              git clone --branch main https://github.com/origenwebnu/hotel-bot-pms-mvp.git /opt/hotel-bot
              cd /opt/hotel-bot
              bash infra/digitalocean/remote-install.sh
            fi
